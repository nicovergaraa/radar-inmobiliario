name: Radar diario

on:
  schedule:
    - cron: "0 7 * * *"    # 07:00 UTC = 3 AM Chile en invierno, 4 AM en verano
                           # (Actions solo entiende UTC fijo y puede variar
                           # ±15-30 min según carga de GitHub)
  workflow_dispatch: {}      # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py

      - name: Publicar base y reporte
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add data docs
          git commit -m "radar: $(date -u +%F)" || echo "sin cambios"
          git push
